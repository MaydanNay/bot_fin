services:
  db:
    image: postgres:15-alpine
    container_name: motionhunter-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mH_Secure777_!2026
      POSTGRES_DB: motionhunter
    volumes:
      - pgdata:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: ./app
    container_name: motionhunter-bot
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./app/.env
    environment:
      DB_HOST: db
      DB_PORT: 5432
    volumes:
      - ./app:/app
    ports:
      - "8080:8080"

volumes:
  pgdata:
