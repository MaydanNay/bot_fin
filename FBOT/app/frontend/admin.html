<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MotionHunter — Админ-панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #0f172a;
        --text-color: #f8fafc;
        --hint-color: #94a3b8;
        --button-color: #8b5cf6;
        --secondary-bg: #1e293b;
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-gradient: linear-gradient(135deg, #8b5cf6, #3b82f6);
        --owner-gradient: linear-gradient(135deg, #f59e0b, #ef4444);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        padding: 20px 16px 100px;
        line-height: 1.5;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .back-btn {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 8px 16px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }

      .user-card {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar {
        width: 44px; height: 44px;
        border-radius: 12px;
        background: var(--accent-gradient);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700;
      }
      .details { flex: 1; overflow: hidden; }
      .name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
      .expiry { font-size: 12px; color: #fbbf24; }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }
      .btn-opt {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border-color);
        color: white;
        padding: 10px 4px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .btn-opt:active { transform: scale(0.95); background: var(--button-color); }

      #search {
        width: 100%;
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 14px;
        border-radius: 16px;
        margin-bottom: 20px;
        outline: none;
      }

      #toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: var(--button-color); color: white;
        padding: 12px 24px; border-radius: 100px;
        font-size: 14px; font-weight: 600; display: none;
        z-index: 1000;
      }

      .stats-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-pill {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 14px 20px;
        flex: 1;
        text-align: center;
      }
      .stat-pill .val { font-size: 28px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .stat-pill .lbl { font-size: 11px; color: var(--hint-color); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
      
      .badge-admin {
        background: var(--accent-gradient);
        color: white;
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: inline-block;
        margin-left: 6px;
        vertical-align: middle;
      }
      .badge-owner {
        background: var(--owner-gradient);
        color: white;
        padding: 4px 8px;
        border-radius: 8px;
        font-size: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: inline-block;
        margin-left: 6px;
        vertical-align: middle;
      }

      /* No Access Modal Styles */
      #no-access-backdrop {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(15, 23, 42, 0.9);
        backdrop-filter: blur(8px);
        z-index: 9999;
        display: none;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }
      .no-access-card {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        border-radius: 24px;
        padding: 32px 24px;
        width: 100%;
        max-width: 340px;
        text-align: center;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
      }
      .no-access-icon {
        width: 64px; height: 64px;
        background: var(--accent-gradient);
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 32px;
        margin: 0 auto 20px;
      }
      .no-access-title { font-size: 20px; font-weight: 700; margin-bottom: 12px; }
      .no-access-text { font-size: 14px; color: var(--hint-color); margin-bottom: 24px; line-height: 1.6; }
      .btn-buy {
        background: var(--button-color);
        color: white;
        border: none;
        padding: 16px;
        border-radius: 12px;
        width: 100%;
        font-size: 15px;
        font-weight: 600;
        cursor: pointer;
        display: block;
        text-decoration: none;
        margin-bottom: 12px;
      }
      .btn-close-modal {
        background: transparent;
        color: var(--hint-color);
        border: none;
        padding: 8px;
        font-size: 14px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- No Access Modal -->
    <div id="no-access-backdrop">
      <div class="no-access-card">
        <div class="no-access-icon">🔒</div>
        <div class="no-access-title">Доступ ограничен</div>
        <div class="no-access-text">
          Для использования этой функции необходима активная подписка или права администратора.
        </div>
        <a href="https://t.me/BelekSadakbek" target="_blank" class="btn-buy">Узнать стоимость</a>
        <button class="btn-close-modal" onclick="closeNoAccessModal()">Закрыть</button>
      </div>
    </div>
    <!-- Modal Add User -->
    <div id="add-user-backdrop" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px;">
      <div class="user-card" style="width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); background: #1e293b; padding: 32px;">
         <h2 style="margin-bottom: 16px;">Добавить пользователя</h2>
         <p style="color: var(--hint-color); font-size: 14px;">Введите номер телефона и выберите срок доступа.</p>
         
         <input type="text" id="new-user-phone" placeholder="+77000000000" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; font-size: 16px; margin-bottom: 20px; outline: none;" />
         
         <label style="display: block; text-align: left; font-size: 12px; color: var(--hint-color); text-transform: uppercase;">Срок доступа:</label>
         <select id="new-user-months" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: #2d3748; color: white; font-size: 16px; margin-bottom: 20px; outline: none; appearance: none;">
           <option value="1">1 Месяц</option>
           <option value="3">3 Месяца</option>
           <option value="6">6 Месяцев</option>
           <option value="12">1 Год</option>
           <option value="0">Безлимит</option>
         </select>

          <label style="display: block; text-align: left; font-size: 12px; color: var(--hint-color); text-transform: uppercase;">Роль пользователя:</label>
          <select id="new-user-role" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: #2d3748; color: white; font-size: 16px; margin-bottom: 24px; outline: none; appearance: none;">
            <option value="user">Обычный пользователь</option>
            <option value="admin">Администратор</option>
          </select>

         <button class="btn-opt" style="width:100%; padding: 16px; background: var(--button-color); margin-bottom: 12px; font-size: 16px;" onclick="submitAddUser()">Создать доступ</button>
         <button class="btn-opt" style="width:100%; padding: 14px;" onclick="closeAddUserModal()">Отмена</button>
      </div>
    </div>
    <div class="header">
      <a href="/profile" class="back-btn">← Назад</a>
      <button class="back-btn" style="background: var(--button-color); border: none; margin-left: auto;" onclick="addUser()">+ Добавить</button>
    </div>

    <div class="stats-row">
      <div class="stat-pill">
        <div class="val" id="stat-total">—</div>
        <div class="lbl">Всего пользователей</div>
      </div>
      <div class="stat-pill">
        <div class="val" id="stat-active">—</div>
        <div class="lbl">Активных</div>
      </div>
    </div>


    <input type="text" id="search" placeholder="Поиск по имени, телефону или UID..." oninput="renderUsers()" />
    <div id="users-list"></div>
    <div id="toast"></div>

    <!-- Modal User Settings -->
    <div id="user-settings-backdrop" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1100; display: none; justify-content: center; align-items: center; padding: 20px;">
      <div class="user-card" style="width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); background: #1e293b; padding: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5);">
         <h3 style="margin-bottom: 20px; text-align: center;">Настройки пользователя</h3>
         
         <div style="margin-bottom: 16px;">
           <label style="font-size: 11px; color: var(--hint-color); text-transform: uppercase; display: block; margin-bottom: 6px;">UID / Телефон</label>
           <div id="settings-user-info" style="font-size: 14px; font-weight: 600; color: white;"></div>
         </div>

         <div style="margin-bottom: 16px;">
           <label style="font-size: 11px; color: var(--hint-color); text-transform: uppercase; display: block; margin-bottom: 6px;">Срок доступа</label>
           <input type="datetime-local" id="settings-expiry" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; outline: none;" />
         </div>

         <div style="margin-bottom: 24px;">
           <label style="font-size: 11px; color: var(--hint-color); text-transform: uppercase; display: block; margin-bottom: 6px;">Роль</label>
           <select id="settings-role" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: #2d3748; color: white; outline: none; width: 100%;">
             <option value="user">Пользователь</option>
             <option value="admin">Администратор</option>
           </select>
         </div>

         <div style="display: flex; gap: 10px;">
           <button class="btn-opt" style="flex: 2; background: var(--button-color); padding: 14px; border: none;" onclick="saveUserSettings()">Сохранить</button>
           <button class="btn-opt" style="flex: 1; padding: 14px; border: 1px solid var(--border-color);" onclick="closeUserSettings()">Отмена</button>
         </div>
         
         <div style="margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px;">
            <button class="btn-opt" style="width: 100%; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); margin-bottom: 10px;" onclick="revokeAccessFromModal()">❌ Аннулировать доступ</button>
            <button class="btn-opt" style="width: 100%; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3);" onclick="deleteUserFromModal()">🗑️ Удалить пользователя</button>
         </div>
      </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      const API_BASE = "";
      let users = [];
      let webToken = localStorage.getItem("web_token");
      const initData = tg.initData || "";
      
      let currentEditingUid = null;
      let currentEditingPhone = null;

      function getAuthHeaders() {
          const headers = { "Content-Type": "application/json" };
          if (initData) headers["X-Telegram-Init-Data"] = initData;
          if (webToken) headers["X-Web-Token"] = webToken;
          return headers;
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2000);
      }

      async function loadUsers() {
        try {
          const res = await fetch(`${API_BASE}/api/admin/users`, {
            headers: getAuthHeaders()
          });
          const data = await res.json();
          if (res.ok) {
            users = data.users;
            document.getElementById("stat-total").innerText = users.length;
            
            const nowIso = new Date().toISOString().replace('T', ' ').slice(0, 16);
            const activeCount = users.filter(u => {
                if (u.is_admin || u.is_owner || u.expires_at === "Безлимит") return true;
                return u.expires_at && u.expires_at >= nowIso;
            }).length;

            document.getElementById("stat-active").innerText = activeCount;
            renderUsers();
          } else if (res.status === 403) {
            showNoAccessModal();
          } else {
            showToast(data.error || "Ошибка доступа");
          }
        } catch (e) {
          showToast("Ошибка сети");
        }
      }

      function showNoAccessModal() {
        document.getElementById("no-access-backdrop").style.display = "flex";
        tg.HapticFeedback.notificationOccurred("warning");
      }

      function closeNoAccessModal() {
        document.getElementById("no-access-backdrop").style.display = "none";
        window.location.href = "/profile";
      }

      function renderUsers() {
        const searchEl = document.getElementById("search");
        const q = searchEl ? searchEl.value.toLowerCase() : "";
        const list = document.getElementById("users-list");
        const filtered = users.filter(u => 
          (u.name && u.name.toLowerCase().includes(q)) || 
          (u.phone && u.phone.includes(q)) ||
          (u.username && u.username.toLowerCase().includes(q)) ||
          (u.uid && u.uid.includes(q))
        );

        list.innerHTML = filtered.map(u => `
          <div class="user-card">
            <div class="user-info">
              <div class="avatar">${(u.name || u.username || "?")[0].toUpperCase()}</div>
              <div class="details">
                <div class="name">
                  ${u.name || u.username || "Без имени"}
                  ${u.is_owner ? '<span class="badge-owner">Владелец</span>' : (u.is_admin ? '<span class="badge-admin">Администратор</span>' : '<span style="font-size:10px; color:var(--hint-color); margin-left:6px;">Пользователь</span>')}
                </div>
                <div class="expiry" style="color: ${u.expires_at === 'Доступ не оплачен' ? '#ef4444' : '#fbbf24'}">
                   ${(u.is_admin || u.is_owner) ? '⚡️ ' : '📅 '} ${u.expires_at || "Бессрочно"}
                </div>
              </div>
            </div>
            <div class="actions" style="grid-template-columns: 1fr 1fr 1fr; margin-bottom: 10px;">
              <div class="btn-opt" onclick="updateAccess('${u.uid}', '${u.phone}', 1)">+1 мес</div>
              <div class="btn-opt" onclick="updateAccess('${u.uid}', '${u.phone}', 3)">+3 мес</div>
              <div class="btn-opt" onclick="updateAccess('${u.uid}', '${u.phone}', 12)">+1 год</div>
            </div>
            <button class="btn-opt" style="width: 100%; border: 1px solid rgba(255,255,255,0.1); background: rgba(139, 92, 246, 0.05); padding: 12px;" onclick="openUserSettings('${u.uid}')">
              ⚙️ Настройки и права
            </button>
          </div>
        `).join("");
      }

      function openUserSettings(uid) {
        const u = users.find(x => x.uid === uid);
        if(!u) return;
        currentEditingUid = uid;
        currentEditingPhone = u.phone;
        
        document.getElementById("settings-user-info").innerText = `${u.name || u.username || 'Юзер'} (${u.phone || u.uid})`;
        
        // Превращаем дату из БД (01.01.2024 12:00) в формат для input datetime-local (2024-01-01T12:00)
        if(u.expires_at && u.expires_at !== 'Безлимит' && u.expires_at !== 'Доступ не оплачен') {
            const parts = u.expires_at.split(' ');
            if (parts.length === 2) {
              const d = parts[0].split('.');
              if (d.length === 3) {
                document.getElementById("settings-expiry").value = `${d[2]}-${d[1]}-${d[0]}T${parts[1]}`;
              }
            } else {
                document.getElementById("settings-expiry").value = "";
            }
        } else {
            document.getElementById("settings-expiry").value = "";
        }
        
        document.getElementById("settings-role").value = u.is_admin ? "admin" : "user";
        document.getElementById("user-settings-backdrop").style.display = "flex";
        tg.HapticFeedback.impactOccurred("light");
      }

      function closeUserSettings() {
        document.getElementById("user-settings-backdrop").style.display = "none";
      }

      async function saveUserSettings() {
        const role = document.getElementById("settings-role").value;
        const expiry = document.getElementById("settings-expiry").value;
        
        tg.HapticFeedback.impactOccurred("heavy");
        try {
          // 1. Сохраняем роль
          const resRole = await fetch(`${API_BASE}/api/admin/update_role`, {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify({ uid: currentEditingUid, role: role })
          });
          
          if (!resRole.ok) {
              const err = await resRole.json();
              showToast(err.error || "Ошибка роли");
              return;
          }

          // 2. Сохраняем дату (если указана)
          if(expiry) {
             const isoDate = new Date(expiry).toISOString();
             await fetch(`${API_BASE}/api/admin/update_access`, {
                method: "POST",
                headers: getAuthHeaders(),
                body: JSON.stringify({ phone: currentEditingPhone, expiry_date: isoDate })
             });
          }

          showToast("Сохранено!");
          closeUserSettings();
          loadUsers();
        } catch (e) { showToast("Ошибка сохранения"); }
      }

      async function revokeAccessFromModal() {
          if (!currentEditingPhone) return;
          if (await revokeAccess(currentEditingPhone)) {
              closeUserSettings();
          }
      }

      async function deleteUserFromModal() {
          if (!currentEditingUid) return;
          
          // Первое подтверждение
          if (!confirm("ВНИМАНИЕ! Вы уверены, что хотите ПОЛНОСТЬЮ УДАЛИТЬ этого пользователя и все его данные? Это действие необратимо.")) return;
          
          // Второе подтверждение (двойное)
          if (!confirm("ПОДТВЕРДИТЕ ЕЩЕ РАЗ: Вы действительно хотите безвозвратно удалить аккаунт " + (currentEditingPhone || currentEditingUid) + "?")) return;

          tg.HapticFeedback.impactOccurred("heavy");
          try {
              const res = await fetch(`${API_BASE}/api/admin/delete_user`, {
                  method: "POST",
                  headers: getAuthHeaders(),
                  body: JSON.stringify({ uid: currentEditingUid })
              });
              
              if (res.ok) {
                  showToast("Пользователь полностью удален!");
                  closeUserSettings();
                  loadUsers();
              } else {
                  const data = await res.json();
                  showToast(data.error || "Ошибка удаления");
              }
          } catch (e) {
              showToast("Ошибка сети");
          }
      }

      async function revokeAccess(phone) {
        if (!confirm("Вы уверены, что хотите полностью аннулировать доступ этому пользователю?")) return false;
        tg.HapticFeedback.impactOccurred("heavy");
        try {
          const res = await fetch(`${API_BASE}/api/admin/revoke_access`, {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify({ phone })
          });
          if (res.ok) {
            showToast("Доступ аннулирован!");
            loadUsers();
            return true;
          } else {
            const data = await res.json();
            showToast(data.error || "Ошибка");
          }
        } catch (e) { showToast("Ошибка сети"); }
        return false;
      }

      async function updateAccess(targetUid, phone, months) {
        tg.HapticFeedback.impactOccurred("medium");
        try {
          const res = await fetch(`${API_BASE}/api/admin/update_access`, {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify({ phone, months })
          });
          const data = await res.json();
          if (res.ok) {
            showToast("Доступ обновлен!");
            loadUsers();
          } else {
            showToast(data.error || "Ошибка");
          }
        } catch (e) { showToast("Ошибка"); }
      }

      function addUser() {
        document.getElementById("add-user-backdrop").style.display = "flex";
        tg.HapticFeedback.impactOccurred("light");
      }
      function closeAddUserModal() {
        document.getElementById("add-user-backdrop").style.display = "none";
      }

      async function submitAddUser() {
        const phone = document.getElementById("new-user-phone").value.trim();
        const months = parseInt(document.getElementById("new-user-months").value);
        const role = document.getElementById("new-user-role").value;
        if (!phone) {
          showToast("Введите номер!");
          return;
        }

        tg.HapticFeedback.impactOccurred("heavy");
        try {
          const res = await fetch(`${API_BASE}/api/admin/add_user`, {
            method: "POST",
            headers: getAuthHeaders(),
            body: JSON.stringify({ phone, months, role })
          });
          const data = await res.json();
          if (res.ok) {
            showToast("Пользователь добавлен!");
            closeAddUserModal();
            loadUsers();
          } else {
            showToast(data.error || "Ошибка");
          }
        } catch (e) { showToast("Ошибка"); }
      }

      window.onload = () => {
        if (tg) {
          tg.ready();
          setTimeout(() => tg.expand(), 500);
        }
        setTimeout(() => loadUsers(), 500);
      };
    </script>
  </body>
</html>
