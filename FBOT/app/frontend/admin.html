<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MotionHunter — Админ-панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #0f172a;
        --text-color: #f8fafc;
        --hint-color: #94a3b8;
        --button-color: #8b5cf6;
        --secondary-bg: #1e293b;
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-gradient: linear-gradient(135deg, #8b5cf6, #3b82f6);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        padding: 20px 16px 100px;
        line-height: 1.5;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .back-btn {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 8px 16px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }

      .user-card {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar {
        width: 44px; height: 44px;
        border-radius: 12px;
        background: var(--accent-gradient);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700;
      }
      .details { flex: 1; overflow: hidden; }
      .name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
      .expiry { font-size: 12px; color: #fbbf24; }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }
      .btn-opt {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border-color);
        color: white;
        padding: 10px 4px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .btn-opt:active { transform: scale(0.95); background: var(--button-color); }

      #search {
        width: 100%;
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 14px;
        border-radius: 16px;
        margin-bottom: 20px;
        outline: none;
      }

      #toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: var(--button-color); color: white;
        padding: 12px 24px; border-radius: 100px;
        font-size: 14px; font-weight: 600; display: none;
        z-index: 1000;
      }

      .stats-row {
        display: flex;
        gap: 10px;
        margin-bottom: 20px;
      }
      .stat-pill {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        border-radius: 16px;
        padding: 14px 20px;
        flex: 1;
        text-align: center;
      }
      .stat-pill .val { font-size: 28px; font-weight: 800; background: var(--accent-gradient); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
      .stat-pill .lbl { font-size: 11px; color: var(--hint-color); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
    </style>
  </head>
  <body>
    <!-- Modal Add User -->
    <div id="add-user-backdrop" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); z-index: 1000; display: none; justify-content: center; align-items: center; padding: 20px;">
      <div class="user-card" style="width: 100%; max-width: 400px; text-align: center; border: 1px solid rgba(255,255,255,0.1); background: #1e293b; padding: 32px;">
         <h2 style="margin-bottom: 16px;">Добавить пользователя</h2>
         <p style="color: var(--hint-color); margin-bottom: 24px; font-size: 14px;">Введите номер телефона и выберите срок доступа.</p>
         
         <input type="text" id="new-user-phone" placeholder="+77000000000" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: rgba(255,255,255,0.05); color: white; font-size: 16px; margin-bottom: 20px; outline: none;" />
         
         <label style="display: block; text-align: left; font-size: 12px; color: var(--hint-color); margin-bottom: 8px; text-transform: uppercase;">Срок доступа:</label>
         <select id="new-user-months" style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--border-color); background: #2d3748; color: white; font-size: 16px; margin-bottom: 24px; outline: none; appearance: none;">
           <option value="1">1 Месяц</option>
           <option value="3">3 Месяца</option>
           <option value="6">6 Месяцев</option>
           <option value="12">1 Год</option>
           <option value="0">Безлимит</option>
         </select>

         <button class="btn-opt" style="width:100%; padding: 16px; background: var(--button-color); margin-bottom: 12px; font-size: 16px;" onclick="submitAddUser()">Создать доступ</button>
         <button class="btn-opt" style="width:100%; padding: 14px;" onclick="closeAddUserModal()">Отмена</button>
      </div>
    </div>
    <div class="header">
      <a href="/profile" class="back-btn">← Назад</a>
      <button class="back-btn" style="background: var(--button-color); border: none; margin-left: auto;" onclick="addUser()">+ Добавить</button>
    </div>

    <div class="stats-row">
      <div class="stat-pill">
        <div class="val" id="stat-total">—</div>
        <div class="lbl">Всего пользователей</div>
      </div>
      <div class="stat-pill">
        <div class="val" id="stat-active">—</div>
        <div class="lbl">Активных</div>
      </div>
    </div>


    <div id="users-list"></div>
    <div id="toast"></div>

    <script>
      const tg = window.Telegram.WebApp;
      const API_BASE = "";
      let users = [];
      let webToken = localStorage.getItem("web_token");

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2000);
      }

      async function loadUsers() {
        try {
          const res = await fetch(`${API_BASE}/api/admin/users`, {
            headers: { "X-Web-Token": webToken }
          });
          const data = await res.json();
          if (res.ok) {
            users = data.users;
            // Обновляем счётчики
            document.getElementById("stat-total").innerText = users.length;
            const activeCount = users.filter(u => u.expires_at === "Безлимит" || u.expires_at > new Date().toISOString().slice(0,16)).length;
            document.getElementById("stat-active").innerText = activeCount;
            renderUsers();
          } else {
            showToast(data.error || "Ошибка доступа");
          }
        } catch (e) {
          showToast("Ошибка сети");
        }
      }

      function renderUsers() {
        const q = document.getElementById("search").value.toLowerCase();
        const list = document.getElementById("users-list");
        const filtered = users.filter(u => 
          (u.name && u.name.toLowerCase().includes(q)) || 
          (u.phone && u.phone.includes(q)) ||
          (u.username && u.username.toLowerCase().includes(q))
        );

        list.innerHTML = filtered.map(u => `
          <div class="user-card">
            <div class="user-info">
              <div class="avatar">${(u.name || "?")[0].toUpperCase()}</div>
              <div class="details">
                <div class="name">${u.name || "Без имени"} (${u.phone})</div>
                <div class="expiry">До: ${u.expires_at || "Бессрочно"}</div>
              </div>
            </div>
            <div class="actions">
              <div class="btn-opt" onclick="updateAccess('${u.phone}', 1)">+1 мес</div>
              <div class="btn-opt" onclick="updateAccess('${u.phone}', 3)">+3 мес</div>
              <div class="btn-opt" onclick="updateAccess('${u.phone}', 12)">+1 год</div>
            </div>
          </div>
        `).join("");
      }

      async function updateAccess(phone, months) {
        tg.HapticFeedback.impactOccurred("medium");
        try {
          const res = await fetch(`${API_BASE}/api/admin/update_access`, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "X-Web-Token": webToken 
            },
            body: JSON.stringify({ phone, months })
          });
          const data = await res.json();
          if (res.ok) {
            showToast("Доступ продлен!");
            loadUsers();
          } else {
            showToast(data.error);
          }
        } catch (e) { showToast("Ошибка"); }
      }

      function addUser() {
        document.getElementById("add-user-backdrop").style.display = "flex";
      }

      function closeAddUserModal() {
        document.getElementById("add-user-backdrop").style.display = "none";
      }

      async function submitAddUser() {
        const phone = document.getElementById("new-user-phone").value.trim();
        const months = document.getElementById("new-user-months").value;
        if (!phone) {
          showToast("Введите номер!");
          return;
        }

        tg.HapticFeedback.impactOccurred("heavy");
        try {
          const res = await fetch(`${API_BASE}/api/admin/add_user`, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "X-Web-Token": webToken 
            },
            body: JSON.stringify({ phone, months })
          });
          const data = await res.json();
          if (res.ok) {
            showToast("Пользователь добавлен!");
            closeAddUserModal();
            loadUsers();
          } else {
            showToast(data.error || "Ошибка");
          }
        } catch (e) { showToast("Ошибка"); }
      }

      loadUsers();
    </script>
  </body>
</html>
