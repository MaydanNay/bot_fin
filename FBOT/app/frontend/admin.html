<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MotionHunter — Админ-панель</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-color: #0f172a;
        --text-color: #f8fafc;
        --hint-color: #94a3b8;
        --button-color: #8b5cf6;
        --secondary-bg: #1e293b;
        --border-color: rgba(255, 255, 255, 0.1);
        --accent-gradient: linear-gradient(135deg, #8b5cf6, #3b82f6);
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        padding: 20px 16px 100px;
        line-height: 1.5;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 24px;
      }
      .back-btn {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 8px 16px;
        border-radius: 12px;
        text-decoration: none;
        font-size: 14px;
        font-weight: 600;
      }

      .user-card {
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        border-radius: 20px;
        padding: 16px;
        margin-bottom: 12px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar {
        width: 44px; height: 44px;
        border-radius: 12px;
        background: var(--accent-gradient);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700;
      }
      .details { flex: 1; overflow: hidden; }
      .name { font-weight: 700; font-size: 15px; margin-bottom: 2px; }
      .expiry { font-size: 12px; color: #fbbf24; }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 8px;
      }
      .btn-opt {
        background: rgba(255,255,255,0.05);
        border: 1px solid var(--border-color);
        color: white;
        padding: 10px 4px;
        border-radius: 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        text-align: center;
      }
      .btn-opt:active { transform: scale(0.95); background: var(--button-color); }

      #search {
        width: 100%;
        background: var(--secondary-bg);
        border: 1px solid var(--border-color);
        color: white;
        padding: 14px;
        border-radius: 16px;
        margin-bottom: 20px;
        outline: none;
      }

      #toast {
        position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
        background: var(--button-color); color: white;
        padding: 12px 24px; border-radius: 100px;
        font-size: 14px; font-weight: 600; display: none;
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <a href="/profile" class="back-btn">← Назад</a>
    </div>

    <input type="text" id="search" placeholder="Поиск по имени или телефону..." oninput="renderUsers()" />

    <div id="users-list"></div>
    <div id="toast"></div>

    <script>
      const tg = window.Telegram.WebApp;
      const API_BASE = "";
      let users = [];
      let webToken = localStorage.getItem("web_token");

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.innerText = msg;
        t.style.display = "block";
        setTimeout(() => t.style.display = "none", 2000);
      }

      async function loadUsers() {
        try {
          const res = await fetch(`${API_BASE}/api/admin/users`, {
            headers: { "X-Web-Token": webToken }
          });
          const data = await res.json();
          if (res.ok) {
            users = data.users;
            renderUsers();
          } else {
            showToast(data.error || "Ошибка доступа");
          }
        } catch (e) {
          showToast("Ошибка сети");
        }
      }

      function renderUsers() {
        const q = document.getElementById("search").value.toLowerCase();
        const list = document.getElementById("users-list");
        const filtered = users.filter(u => 
          (u.name && u.name.toLowerCase().includes(q)) || 
          (u.phone && u.phone.includes(q)) ||
          (u.username && u.username.toLowerCase().includes(q))
        );

        list.innerHTML = filtered.map(u => `
          <div class="user-card">
            <div class="user-info">
              <div class="avatar">${(u.name || "?")[0].toUpperCase()}</div>
              <div class="details">
                <div class="name">${u.name || "Без имени"} (${u.phone})</div>
                <div class="expiry">До: ${u.expires_at || "Бессрочно"}</div>
              </div>
            </div>
            <div class="actions">
              <div class="btn-opt" onclick="updateAccess('${u.phone}', 1)">+1 мес</div>
              <div class="btn-opt" onclick="updateAccess('${u.phone}', 3)">+3 мес</div>
              <div class="btn-opt" onclick="updateAccess('${u.phone}', 12)">+1 год</div>
            </div>
          </div>
        `).join("");
      }

      async function updateAccess(phone, months) {
        tg.HapticFeedback.impactOccurred("medium");
        try {
          const res = await fetch(`${API_BASE}/api/admin/update_access`, {
            method: "POST",
            headers: { 
              "Content-Type": "application/json",
              "X-Web-Token": webToken 
            },
            body: JSON.stringify({ phone, months })
          });
          const data = await res.json();
          if (res.ok) {
            showToast("Доступ продлен!");
            loadUsers();
          } else {
            showToast(data.error);
          }
        } catch (e) { showToast("Ошибка"); }
      }

      loadUsers();
    </script>
  </body>
</html>
